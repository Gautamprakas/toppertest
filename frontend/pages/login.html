<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login – TopperTest Government Typing Practice</title>
  <meta name="description" content="Login to TopperTest to access your typing history, analytics and practice government exam typing tests." />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 16px; }
    .auth-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo h1 { font-size: 26px; color: var(--primary); }
    .auth-logo p  { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .auth-card h2 { font-size: 20px; margin-bottom: 24px; color: var(--primary); }
    .divider-text { text-align: center; color: var(--muted); font-size: 13px; margin: 16px 0; position: relative; }
    .divider-text::before, .divider-text::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
    .divider-text::before { left: 0; } .divider-text::after { right: 0; }
    .icon-inline{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;flex-shrink:0}
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand"><a href="/" style="color:#fff;"><div class="brand-text"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M6 14h12"/></svg> TopperTest</div><div class="brand-sub">by ASI Sandeep</div></a></div>
  <div id="nav-right"></div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <h1><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M6 14h12"/></svg> TopperTest</h1>
      <p>Government Exam Typing Practice by ASI Sandeep</p>
    </div>
    <h2>Welcome Back</h2>
    <div id="alert-box"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="Enter your email" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" />
    </div>

    <button class="btn btn-primary btn-block btn-lg mt-2" id="login-btn" onclick="doLogin()">Login →</button>

    <div class="divider-text mt-3">New to TopperTest?</div>
    <a href="/pages/register.html" class="btn btn-outline btn-block">Create Free Account</a>

    <p class="text-center mt-3" style="font-size:12px;color:var(--muted);">
      By logging in you agree to practice genuinely for your government exam preparation.
    </p>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = '/pages/dashboard.html';

  async function doLogin() {
    const btn   = document.getElementById('login-btn');
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const box   = document.getElementById('alert-box');

    if (!email || !pass) { box.innerHTML = '<div class="alert alert-error"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Please enter email and password.</div>'; return; }

    btn.disabled = true; btn.textContent = 'Logging in...';
    try {
      const data = await apiFetch('/login', { method: 'POST', body: JSON.stringify({ email, password: pass }) });
      Auth.setToken(data.token);
      Auth.setUser(data.user);
      showToast('Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = '/pages/dashboard.html', 800);
    } catch (err) {
      box.innerHTML = `<div class="alert alert-error"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> ${err.message}</div>`;
      btn.disabled = false; btn.textContent = 'Login →';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
