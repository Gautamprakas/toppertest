<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Test Result | TopperTest</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="/css/style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V3DLNRTMY6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-V3DLNRTMY6');
  </script>
  <style>
    .icon-inline{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;flex-shrink:0}
    .stat-card.danger { border-color:var(--danger); }
    .stat-card.danger .stat-value { color:var(--danger); }
    .stat-card.muted-c { border-color:#94a3b8; }
    .stat-card.muted-c .stat-value { color:#64748b; }

    .lang-pill { display:inline-flex; background:#e2e8f0; border-radius:99px; padding:3px; }
    .lang-pill button {
      border:none; background:transparent; color:var(--muted);
      font-family:var(--font-body); font-size:13px; font-weight:600;
      padding:5px 16px; border-radius:99px; cursor:pointer; transition:all .15s;
    }
    .lang-pill button.active { background:var(--primary); color:#fff; }

    .sol-card { background:#fff; border-radius:10px; box-shadow:var(--shadow); padding:18px 22px; margin-bottom:16px; }
    .sol-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
    .badge-section { background:#eef4ff; color:var(--primary); border:1px solid #c7d7f0; }
    .sol-q { font-size:15px; line-height:1.7; margin-bottom:12px; white-space:pre-wrap; }
    .sol-opt {
      display:flex; align-items:flex-start; gap:10px;
      border:1.5px solid var(--border); border-radius:8px;
      padding:9px 13px; margin-bottom:7px; font-size:14px; line-height:1.55;
    }
    .sol-opt .so-key { font-weight:800; flex-shrink:0; width:20px; }
    .sol-opt .so-ic { flex-shrink:0; width:18px; height:18px; margin-left:auto; }
    .sol-opt.is-correct { background:#d1fae5; border-color:#6ee7b7; }
    .sol-opt.is-wrong   { background:#fee2e2; border-color:#fca5a5; }
    .sol-verdict { font-size:13px; font-weight:600; margin:10px 0 0; }
    .expl-box {
      background:#dbeafe; border:1px solid #93c5fd; border-radius:8px;
      padding:12px 15px; margin-top:12px; font-size:13.5px; line-height:1.7; color:#1e3a5f;
      white-space:pre-wrap;
    }
    .expl-box .ex-label { font-weight:700; color:#1e40af; display:block; margin-bottom:4px; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand"><a href="/" style="color:#fff;"><div class="brand-text"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M6 14h12"/></svg> TopperTest</div><div class="brand-sub">by ASI Sandeep</div></a></div>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/pages/test-series.html" class="active">Test Series</a></li>
    <li><a href="/pages/leaderboard.html">Leaderboard</a></li>
    <li id="nav-right"></li>
  </ul>
</nav>

<div style="background:var(--bg);min-height:calc(100vh - 64px);padding:32px 16px;">
<div style="max-width:900px;margin:0 auto;" id="page-wrap">
  <div style="text-align:center;padding:60px 0;"><div class="spinner" style="margin:auto;"></div></div>
</div>
</div>

<script src="/js/app.js"></script>
<script>
const attemptId = parseInt(new URLSearchParams(location.search).get('attempt'), 10);
let RESULT = null;
let LANG = 'en';

function pickText(en, hi) {
  return LANG === 'hi' ? (hi || en || '') : (en || hi || '');
}
function mmss(sec) {
  sec = Math.max(0, Math.round(Number(sec) || 0));
  return `${String(Math.floor(sec / 60)).padStart(2, '0')}:${String(sec % 60).padStart(2, '0')}`;
}

const IC_CHECK = '<svg class="so-ic" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const IC_X     = '<svg class="so-ic" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

function setLang(l) {
  LANG = l;
  document.getElementById('lang-hi')?.classList.toggle('active', l === 'hi');
  document.getElementById('lang-en')?.classList.toggle('active', l === 'en');
  renderSolutions();
}

function render(r) {
  const submitted = r.submitted_at ? new Date(r.submitted_at).toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
  const sections = r.sections || {};

  document.title = `Result – ${r.test.title} | TopperTest`;
  document.getElementById('page-wrap').innerHTML = `
    <div class="card mb-3">
      <div class="card-body">
        <h1 style="font-size:24px;color:var(--primary);">Result &mdash; ${escHtml(r.test.title)}</h1>
        <p class="text-muted" style="font-size:14px;margin-top:4px;">${escHtml(r.test.series_title || '')}</p>
        ${submitted ? `<p class="text-muted" style="font-size:12.5px;margin-top:4px;">
          <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Submitted: ${escHtml(submitted)}</p>` : ''}
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card accent"><div class="stat-value">${Number(r.score)} / ${Number(r.total_marks)}</div><div class="stat-label">Score</div></div>
      <div class="stat-card success"><div class="stat-value">${Number(r.correct_count) || 0}</div><div class="stat-label">Correct</div></div>
      <div class="stat-card danger"><div class="stat-value">${Number(r.wrong_count) || 0}</div><div class="stat-label">Wrong</div></div>
      <div class="stat-card muted-c"><div class="stat-value">${Number(r.skipped_count) || 0}</div><div class="stat-label">Skipped</div></div>
      <div class="stat-card info"><div class="stat-value">${mmss(r.time_taken)}</div><div class="stat-label">Time Taken</div></div>
    </div>

    <div class="card mb-3">
      <div class="card-header"><h3 style="font-size:15px;">Section-wise Performance</h3></div>
      <div class="card-body" style="padding:0;">
        <div class="table-wrap"><table>
          <thead><tr><th>Section</th><th>Questions</th><th>Correct</th><th>Wrong</th><th>Skipped</th><th>Marks</th></tr></thead>
          <tbody>
            ${Object.keys(sections).map(name => {
              const s = sections[name];
              return `<tr>
                <td style="font-weight:700;color:var(--primary);">${escHtml(name)}</td>
                <td>${Number(s.total) || 0}</td>
                <td style="color:var(--success);font-weight:600;">${Number(s.correct) || 0}</td>
                <td style="color:var(--danger);font-weight:600;">${Number(s.wrong) || 0}</td>
                <td style="color:var(--muted);">${Number(s.skipped) || 0}</td>
                <td style="font-weight:700;">${Number(s.marks)}</td>
              </tr>`;
            }).join('') || '<tr><td colspan="6" class="text-center text-muted">No section data</td></tr>'}
          </tbody>
        </table></div>
      </div>
    </div>

    <div class="d-flex align-center justify-between mb-2" style="flex-wrap:wrap;gap:10px;">
      <h2 style="font-size:19px;color:var(--primary);">
        <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        Solutions
      </h2>
      <div class="lang-pill">
        <button type="button" id="lang-hi" onclick="setLang('hi')">&#2361;&#2367;&#2306;&#2342;&#2368;</button>
        <button type="button" id="lang-en" class="active" onclick="setLang('en')">English</button>
      </div>
    </div>
    <div id="solutions"></div>

    <div class="d-flex gap-2 mt-4" style="justify-content:center;flex-wrap:wrap;">
      <a class="btn btn-primary" href="/pages/test-series-detail.html?id=${encodeURIComponent(r.test.series_id)}">
        <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Series
      </a>
      <a class="btn btn-outline" href="/pages/test-series.html">All Test Series</a>
    </div>`;

  renderSolutions();
}

function renderSolutions() {
  if (!RESULT) return;
  const el = document.getElementById('solutions');
  if (!el) return;

  el.innerHTML = (RESULT.questions || []).map((q, i) => {
    const opts = [
      ['A', q.option_a_en, q.option_a_hi],
      ['B', q.option_b_en, q.option_b_hi],
      ['C', q.option_c_en, q.option_c_hi],
      ['D', q.option_d_en, q.option_d_hi],
    ];
    const ua = q.user_answer || null;
    const co = q.correct_option;
    const expl = pickText(q.explanation_en, q.explanation_hi);

    const optHtml = opts.map(([k, en, hi]) => {
      const isCorrect = k === co;
      const isWrongPick = ua === k && ua !== co;
      return `<div class="sol-opt ${isCorrect ? 'is-correct' : ''} ${isWrongPick ? 'is-wrong' : ''}">
        <span class="so-key">${k}</span>
        <span>${escHtml(pickText(en, hi))}</span>
        ${isCorrect ? IC_CHECK : isWrongPick ? IC_X : ''}
      </div>`;
    }).join('');

    let verdict;
    if (!ua) verdict = `<span style="color:var(--muted);">Not answered</span> &middot; Correct answer: <span style="color:var(--success);">${escHtml(co || '-')}</span>`;
    else if (ua === co) verdict = `Your answer: <span style="color:var(--success);">${escHtml(ua)}</span> &middot; <span style="color:var(--success);">Correct</span>`;
    else verdict = `Your answer: <span style="color:var(--danger);">${escHtml(ua)}</span> &middot; Correct answer: <span style="color:var(--success);">${escHtml(co || '-')}</span>`;

    return `
      <div class="sol-card">
        <div class="sol-head">
          <strong style="color:var(--primary);font-size:14px;">Q${i + 1}</strong>
          <span class="badge badge-section">${escHtml(q.section || 'General')}</span>
        </div>
        <div class="sol-q">${escHtml(pickText(q.question_en, q.question_hi))}</div>
        ${optHtml}
        <p class="sol-verdict">${verdict}</p>
        ${expl ? `<div class="expl-box"><span class="ex-label">Explanation</span>${escHtml(expl)}</div>` : ''}
      </div>`;
  }).join('') || '<div class="sol-card text-center text-muted">No question data available.</div>';
}

function fail(msg) {
  document.getElementById('page-wrap').innerHTML =
    `<div class="card"><div class="card-body text-center text-muted">${escHtml(msg)}<br class="mb-2">
      <a class="btn btn-primary btn-sm mt-2" href="/pages/test-series.html">All Test Series</a></div></div>`;
}

(function init() {
  if (!attemptId) { fail('Invalid result link.'); return; }

  // Fresh result handed over from mock-test.html?
  let cached = null;
  try { cached = JSON.parse(sessionStorage.getItem('tt_mock_result') || 'null'); } catch (e) {}
  if (cached && Number(cached.attempt_id) === attemptId) {
    RESULT = cached;
    render(RESULT);
    return;
  }

  // Otherwise fetch the review (auth required)
  if (!requireLogin()) return;
  apiFetch(`/mock-attempts/${attemptId}/review`)
    .then(r => { RESULT = r; render(r); })
    .catch(err => fail('Failed to load result: ' + err.message));
})();
</script>
</body>
</html>
