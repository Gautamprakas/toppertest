<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V3DLNRTMY6"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-V3DLNRTMY6');

  <title>Leaderboard – TopperTest Government Typing Practice</title>
  <meta name="description" content="See top typing speed rankings for government exam practice on TopperTest. Compare WPM scores for SSC, UP Police, High Court typing tests." />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .rank-1 { background: linear-gradient(90deg, #fef9c3, #fff); }
    .rank-2 { background: linear-gradient(90deg, #f1f5f9, #fff); }
    .rank-3 { background: linear-gradient(90deg, #fef3c7, #fff); }
    .rank-medal { font-size: 22px; width: 36px; text-align: center; }
    .wpm-bar { width: 100px; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 8px; }
    .wpm-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 4px; }
    .icon-inline{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;flex-shrink:0}
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand"><a href="/" style="color:#fff;"><div class="brand-text"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M6 14h12"/></svg> TopperTest</div></a></div>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/pages/exams.html">Exams</a></li>
    <li><a href="/pages/quick-test.html">1-Min Test</a></li>
    <li><a href="/pages/leaderboard.html" class="active">Leaderboard</a></li>
    <li id="nav-right"></li>
  </ul>
</nav>
<div style="background:var(--bg);min-height:calc(100vh - 64px);padding:32px 16px;">
<div style="max-width:900px;margin:0 auto;">

  <div class="text-center mb-4">
    <h1 style="font-size:36px;color:var(--primary);"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10v4a5 5 0 01-10 0V4z"/><path d="M7 5H3v2a4 4 0 004 4M17 5h4v2a4 4 0 01-4 4"/><path d="M8 21h8M12 17v4"/></svg> Leaderboard</h1>
    <p class="text-muted">Top typists on TopperTest – compete and improve your ranking</p>
  </div>

  <!-- Filter by exam -->
  <div class="card mb-4">
    <div class="card-body" style="padding:16px 20px;">
      <div class="d-flex align-center gap-2">
        <label class="form-label" style="margin:0;white-space:nowrap;">Filter by Exam:</label>
        <select class="form-control form-select" id="exam-filter" onchange="loadLeaderboard()" style="max-width:280px;">
          <option value="">All Exams</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body" style="padding:0;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:60px;">Rank</th>
              <th>Student</th>
              <th>Exam</th>
              <th>Best WPM</th>
              <th>Avg Accuracy</th>
              <th>Tests</th>
            </tr>
          </thead>
          <tbody id="lb-tbody">
            <tr><td colspan="6" class="text-center" style="padding:40px;color:var(--muted);">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <p class="text-center text-muted mt-3" style="font-size:13px;">
    Take more tests to appear on the leaderboard. Only verified test results are counted.
  </p>
</div>
</div>

<script src="/js/app.js"></script>
<script>
  const medals = ['<span style="color:#eab308;font-weight:800;">1st</span>', '<span style="color:#94a3b8;font-weight:800;">2nd</span>', '<span style="color:#b45309;font-weight:800;">3rd</span>'];

  apiFetch('/exams').then(exams => {
    const sel = document.getElementById('exam-filter');
    sel.innerHTML = '<option value="">All Exams</option>' + exams.map(e => `<option value="${e.id}">${e.exam_name}</option>`).join('');
  });

  function loadLeaderboard() {
    const exam = document.getElementById('exam-filter').value;
    const url  = exam ? `/leaderboard?exam_id=${exam}` : '/leaderboard';
    apiFetch(url).then(rows => {
      const maxWpm = rows[0]?.best_wpm || 100;
      document.getElementById('lb-tbody').innerHTML = rows.length
        ? rows.map((r, i) => `
          <tr class="${i < 3 ? 'rank-' + (i+1) : ''}">
            <td class="rank-medal">${medals[i] || (i+1)}</td>
            <td><strong>${r.name}</strong></td>
            <td style="font-size:13px;color:var(--muted);">${r.exam_name}</td>
            <td>
              <strong style="font-size:18px;color:var(--primary);">${r.best_wpm}</strong>
              <div class="wpm-bar"><div class="wpm-bar-fill" style="width:${(r.best_wpm/maxWpm*100).toFixed(0)}%"></div></div>
            </td>
            <td style="color:${r.avg_accuracy >= 90 ? 'var(--success)' : 'var(--warning)'};">${r.avg_accuracy}%</td>
            <td style="color:var(--muted);">${r.total_tests}</td>
          </tr>`).join('')
        : '<tr><td colspan="6" class="text-center" style="padding:40px;color:var(--muted);">No data yet. Be the first to take a test!</td></tr>';
    });
  }

  loadLeaderboard();
</script>
</body>
</html>
