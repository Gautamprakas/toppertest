<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Series – Mock Tests | TopperTest</title>
  <meta name="description" content="Attempt full-length UPP mock tests with real CBT interface, negative marking and detailed bilingual solutions on TopperTest." />
  <link rel="stylesheet" href="/css/style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V3DLNRTMY6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-V3DLNRTMY6');
  </script>
  <style>
    .icon-inline{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;flex-shrink:0}
    .badge-track { background:#ede9fe; color:#5b21b6; }
    .score-strip {
      display:flex; gap:28px; flex-wrap:wrap; align-items:center;
      background:#f0f9ff; border:1px solid #bae6fd; border-radius:10px;
      padding:14px 20px; margin-bottom:20px;
    }
    .score-strip .ss-item { display:flex; flex-direction:column; }
    .score-strip .ss-val { font-size:20px; font-weight:800; font-family:var(--font-head); color:var(--primary); }
    .score-strip .ss-label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    .test-row {
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      background:#fff; border:1px solid var(--border); border-radius:10px;
      padding:16px 20px; margin-bottom:12px; flex-wrap:wrap; transition:box-shadow .2s;
    }
    .test-row:hover { box-shadow:var(--shadow); }
    .test-row .tr-title { font-size:15px; font-weight:700; color:var(--primary); }
    .test-row .tr-meta { font-size:12.5px; color:var(--muted); margin-top:3px; }
    .test-row .tr-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .badge-best { background:#d1fae5; color:#065f46; padding:5px 12px; font-size:12px; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand"><a href="/" style="color:#fff;"><div class="brand-text"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M6 14h12"/></svg> TopperTest</div><div class="brand-sub">by ASI Sandeep</div></a></div>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/pages/test-series.html" class="active">Test Series</a></li>
    <li><a href="/pages/leaderboard.html">Leaderboard</a></li>
    <li id="nav-right"></li>
  </ul>
</nav>

<div style="background:var(--bg);min-height:calc(100vh - 64px);padding:32px 16px;">
<div style="max-width:860px;margin:0 auto;">
  <p class="mb-2" style="font-size:13px;">
    <a href="/pages/test-series.html">
      <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      All Test Series
    </a>
  </p>
  <div id="page-wrap">
    <div style="text-align:center;padding:60px 0;"><div class="spinner" style="margin:auto;"></div></div>
  </div>
</div>
</div>

<script src="/js/app.js"></script>
<script>
const TRACK_LABELS = { UPP_ASI_SI: 'UPP ASI / SI', UPP_CO: 'UPP Computer Operator' };
const seriesId = parseInt(new URLSearchParams(location.search).get('id'), 10);
let SERIES = null;

function render(s) {
  const loggedIn = Auth.isLoggedIn();
  const tests = (s.tests || []).slice().sort((a, b) => (a.test_number || 0) - (b.test_number || 0));

  // Scorecard summary (client-side, only meaningful when logged in)
  let strip = '';
  if (loggedIn) {
    const done = tests.filter(t => t.attempt_status === 'completed');
    const bestSum = done.reduce((acc, t) => acc + (Number(t.best_score) || 0), 0);
    const marksSum = done.reduce((acc, t) => acc + (Number(t.total_marks) || 0), 0);
    strip = `
      <div class="score-strip">
        <strong style="color:var(--primary);font-size:14px;">
          <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10v4a5 5 0 01-10 0V4z"/><path d="M7 5H3v2a4 4 0 004 4M17 5h4v2a4 4 0 01-4 4"/><path d="M8 21h8M12 17v4"/></svg>
          Your Scorecard
        </strong>
        <div class="ss-item"><span class="ss-val">${done.length} / ${tests.length}</span><span class="ss-label">Tests Completed</span></div>
        <div class="ss-item"><span class="ss-val">${bestSum}${marksSum ? ' / ' + marksSum : ''}</span><span class="ss-label">Total Best Marks</span></div>
      </div>`;
  }

  const rows = tests.map(t => {
    let actions;
    if (!loggedIn) {
      actions = `<a class="btn btn-outline btn-sm" href="/pages/login.html">Login to Attempt</a>`;
    } else if (t.attempt_status === 'completed') {
      actions = `
        <span class="badge badge-best">Best: ${Number(t.best_score) || 0}/${Number(t.total_marks) || 0}</span>
        <a class="btn btn-outline btn-sm" href="/pages/mock-result.html?attempt=${encodeURIComponent(t.last_attempt_id)}">View Result</a>
        <button class="btn btn-outline btn-sm" data-start="${t.id}" data-num="${t.test_number}" data-dur="${t.duration_minutes}">Re-attempt</button>`;
    } else {
      actions = `<button class="btn btn-primary btn-sm" data-start="${t.id}" data-num="${t.test_number}" data-dur="${t.duration_minutes}">Start Test</button>`;
    }
    return `
      <div class="test-row">
        <div style="flex:1;min-width:220px;">
          <div class="tr-title">Test ${escHtml(String(t.test_number))}: ${escHtml(t.title)}</div>
          <div class="tr-meta">
            ${Number(t.question_count) || 0} Questions &middot; ${Number(t.duration_minutes) || 0} min
            &middot; ${Number(t.total_marks) || 0} Marks &middot; Negative: ${escHtml(String(t.negative_marks))}
          </div>
        </div>
        <div class="tr-actions">${actions}</div>
      </div>`;
  }).join('');

  document.getElementById('page-wrap').innerHTML = `
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex align-center justify-between" style="gap:12px;flex-wrap:wrap;">
          <h1 style="font-size:24px;color:var(--primary);">${escHtml(s.title)}</h1>
          <span class="badge badge-track">${escHtml(TRACK_LABELS[s.track_code] || s.track_code)}</span>
        </div>
        <p class="text-muted mt-1" style="font-size:14px;">${escHtml(s.description || '')}</p>
        <p class="mt-1" style="font-size:13px;font-weight:600;color:var(--primary);">
          <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><rect x="9" y="2" width="6" height="4" rx="1"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          ${tests.length} Test${tests.length !== 1 ? 's' : ''} in this series
        </p>
      </div>
    </div>
    ${strip}
    ${rows || '<div class="test-row" style="justify-content:center;color:var(--muted);">No tests in this series yet.</div>'}`;

  // Delegated click handler for Start / Re-attempt buttons
  document.getElementById('page-wrap').addEventListener('click', ev => {
    const btn = ev.target.closest('[data-start]');
    if (btn) startTest(btn);
  });
}

async function startTest(btn) {
  const testId = parseInt(btn.dataset.start, 10);
  const num = btn.dataset.num, dur = btn.dataset.dur;
  if (!confirm(`Start Test ${num}? Duration ${dur} min — the timer starts immediately.`)) return;
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = 'Starting...';
  try {
    const resp = await apiFetch(`/mock-tests/${testId}/start`, { method: 'POST' });
    sessionStorage.setItem('tt_mock_session', JSON.stringify(resp));
    location.href = '/pages/mock-test.html';
  } catch (err) {
    btn.disabled = false; btn.textContent = orig;
    showToast(err.message || 'Failed to start test', 'error');
  }
}

if (!seriesId) {
  document.getElementById('page-wrap').innerHTML =
    '<div class="card"><div class="card-body text-center text-muted">Invalid series link. <a href="/pages/test-series.html">Browse all test series</a></div></div>';
} else {
  apiFetch(`/test-series/${seriesId}`).then(s => {
    SERIES = s;
    document.title = `${s.title} – Mock Tests | TopperTest`;
    render(s);
  }).catch(err => {
    document.getElementById('page-wrap').innerHTML =
      `<div class="card"><div class="card-body text-center text-muted">Failed to load series: ${escHtml(err.message)}<br><a href="/pages/test-series.html">Back to all test series</a></div></div>`;
  });
}
</script>
</body>
</html>
