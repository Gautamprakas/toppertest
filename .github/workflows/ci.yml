name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: toppertest
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      PORT: 5000
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASS: root
      DB_NAME: toppertest
      JWT_SECRET: ci_test_secret
      ALLOWED_ORIGIN: "*"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Load database schema
        run: mysql -h127.0.0.1 -P3306 -uroot -proot < backend/config/schema.sql

      - name: Run migrations
        working-directory: backend
        run: node scripts/migrate.js

      - name: Run tests
        working-directory: backend
        run: npm test

      - name: Build check - boot the server
        working-directory: backend
        run: |
          node server.js &
          SERVER_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5000/api/exams > /dev/null; then
              echo "Server booted successfully"
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to respond in time"
          kill $SERVER_PID
          exit 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            backend/
            !backend/node_modules

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/,frontend/"
          target: "/home/ubuntu/toppertest"
          overwrite: true

      - name: Install dependencies and restart app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/toppertest/backend
            npm ci --omit=dev
            node scripts/migrate.js
            pm2 restart toppertest
